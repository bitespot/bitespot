name: Deploy BiteSpot to EC2 (main branch)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        run: |
          ssh -o StrictHostKeyChecking=no ec2-user@${{ secrets.EC2_HOST }} << 'EOF'
          set -e

          echo "=========================================="
          echo "  BiteSpot Deployment Starting..."
          echo "=========================================="

          cd /var/www/bitespot

          # -------------------------------------------------------
          # [1/7] Fix permissions so ec2-user can run git
          # -------------------------------------------------------
          echo ""
          echo "[1/7] Fixing ownership for git operations..."
          sudo chown -R ec2-user:ec2-user /var/www/bitespot
          echo "✓ Ownership set to ec2-user"

          # -------------------------------------------------------
          # [2/7] Pull latest code
          # -------------------------------------------------------
          echo ""
          echo "[2/7] Pulling latest code from main..."
          git fetch origin
          git reset --hard origin/main
          echo "✓ Code updated to:"
          git log --oneline -1

          # -------------------------------------------------------
          # [3/7] Install PHP dependencies
          # -------------------------------------------------------
          echo ""
          echo "[3/7] Installing Composer dependencies..."
          /usr/local/bin/composer install --no-dev --optimize-autoloader --no-interaction
          echo "✓ Composer dependencies installed"

          # -------------------------------------------------------
          # [4/7] Build frontend assets
          # -------------------------------------------------------
          echo ""
          echo "[4/7] Building frontend assets (npm)..."
          npm ci
          npm run build
          echo "✓ Frontend assets built"

          # -------------------------------------------------------
          # [5/7] Laravel setup
          # -------------------------------------------------------
          echo ""
          echo "[5/7] Running Laravel setup..."

          # Generate APP_KEY if missing
          if ! grep -q "APP_KEY=base64:" .env; then
            echo "Generating APP_KEY..."
            php artisan key:generate --force
          fi

          # Run migrations
          echo "Running migrations..."
          php artisan migrate --force

          # Clear and rebuild caches
          echo "Clearing caches..."
          php artisan cache:clear
          php artisan config:clear
          php artisan route:clear
          php artisan view:clear

          # Re-link storage
          php artisan storage:link --force 2>/dev/null || true

          echo "✓ Laravel setup complete"

          # -------------------------------------------------------
          # [6/7] Fix permissions for Apache
          # -------------------------------------------------------
          echo ""
          echo "[6/7] Setting permissions for Apache..."
          sudo chown -R apache:apache /var/www/bitespot
          sudo chmod -R 755 /var/www/bitespot
          sudo chmod -R 775 /var/www/bitespot/storage
          sudo chmod -R 775 /var/www/bitespot/bootstrap/cache
          sudo chown -R apache:apache /var/www/bitespot/public/build
          echo "✓ Permissions set"

          # -------------------------------------------------------
          # [7/7] Reload Apache
          # -------------------------------------------------------
          echo ""
          echo "[7/7] Reloading Apache..."
          sudo systemctl reload httpd
          echo "✓ Apache reloaded"

          echo ""
          echo "=========================================="
          echo "  ✓ Deployment completed successfully!"
          echo "  $(date)"
          echo "=========================================="
          EOF